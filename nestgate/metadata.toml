# nestgate — Storage & persistence primal
# SPDX-License-Identifier: AGPL-3.0-or-later

[primal]
name = "nestgate"
version = "2.1.0"
domain = "storage"
description = "Secure storage, encrypted persistence, and data lifecycle management"
license = "AGPL-3.0-or-later"

[provenance]
built_from = "primals/nestGate"
built_at = "2026-03-25T12:36:55Z"

[compatibility]
min_ipc_version = "1.0"
capabilities = [
    "storage.put",
    "storage.get",
    "storage.delete",
    "storage.list",
    "discovery.announce",
    "discovery.query",
]

# ── ecoBin: per-architecture builds ─────────────────────────────────

[builds.x86_64-linux]
binary = "nestgate"
checksum_sha256 = "c1f6b28217d00f618c84839bf7743dd4de966537a7e656790eb1e0042a00c086"
target = "x86_64-unknown-linux-musl"
pie_verified = true
static_linked = true

[builds.aarch64-linux]
binary = "nestgate"
target = "aarch64-unknown-linux-musl"
pie_verified = true
static_linked = true
# checksum_sha256 = ""  # populated on first aarch64 harvest

# ── genomeBin: deployment intelligence ──────────────────────────────
# Runtime env (set by deployer, not in metadata): NESTGATE_FAMILY_ID, NESTGATE_JWT_SECRET

[genomeBin]
tier = "genomeBin"
unibin_modes = ["daemon", "server", "version"]
default_mode = "daemon"

# NestGate: `daemon --socket-only --dev` (not beardog-style TCP listen).
[genomeBin.server]
tcp_port_env = "NESTGATE_PORT"
tcp_port_default = 9300
socket_only_flag = "--socket-only"
dev_flag = "--dev"

[genomeBin.service]
restart_policy = "always"
after = ["beardog", "songbird"]
wants = []
