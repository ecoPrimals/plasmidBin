# neuralspring — Neural science primal (from neuralSpring)
# SPDX-License-Identifier: AGPL-3.0-or-later

[primal]
name = "neuralspring"
version = "0.7.0"
domain = "ml"
description = "ML primitives, spectral analysis, neural network validation"
license = "AGPL-3.0-or-later"

[provenance]
built_from = "springs/neuralSpring"
built_at = "2026-03-28T00:00:00Z"

[compatibility]
min_ipc_version = "1.0"
capabilities = [
    "ml.validate",
    "ml.spectral",
]

# ── ecoBin: per-architecture builds ─────────────────────────────────

[builds.x86_64-linux]
binary = "neuralspring"
target = "x86_64-unknown-linux-musl"
pie_verified = true
static_linked = true
# checksum_sha256 = ""  # populated on harvest

[builds.aarch64-linux]
binary = "neuralspring"
target = "aarch64-unknown-linux-musl"
pie_verified = true
static_linked = true
# checksum_sha256 = ""  # populated on harvest

# ── genomeBin: deployment intelligence ──────────────────────────────

[genomeBin]
tier = "ecoBin"
unibin_modes = ["server", "version"]
default_mode = "server"

[genomeBin.server]
tcp_port_env = "NEURALSPRING_PORT"
tcp_port_default = 9870

[genomeBin.service]
restart_policy = "always"
after = ["beardog", "songbird"]
wants = []
